<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAIN // THE WIRED</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323:wght@400&display=swap');

  :root {
    --bg: #0a0a0f;
    --dark: #05050a;
    --wired: #7b2fff;
    --wired-dim: #3d1799;
    --cyan: #00fff7;
    --cyan-dim: #004d4a;
    --red: #ff2266;
    --green: #00ff88;
    --text: #c8b8ff;
    --glow-purple: 0 0 8px #7b2fff, 0 0 20px #3d179966;
    --glow-cyan: 0 0 8px #00fff7, 0 0 20px #00fff766;
    --glow-red: 0 0 8px #ff2266, 0 0 20px #ff226666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
  }

  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* CRT flicker */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(123,47,255,0.03);
    pointer-events: none;
    z-index: 9998;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.35; }
    94% { opacity: 1; }
    96% { opacity: 0.55; }
    97% { opacity: 1; }
  }

  #wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #hud-top {
    width: 560px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'VT323', monospace;
    font-size: 28px;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 3px;
  }

  #canvas-container {
    position: relative;
    border: 1px solid var(--wired-dim);
    box-shadow: 0 0 40px #7b2fff55, 0 0 80px #7b2fff22, inset 0 0 40px #05050a88;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  #hud-bottom {
    width: 560px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: var(--wired-dim);
    letter-spacing: 2px;
  }

  /* Overlay screens */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,5,10,0.93);
    z-index: 10;
    gap: 20px;
    padding: 40px;
  }

  .screen.hidden { display: none; }

  .screen-title {
    font-family: 'VT323', monospace;
    font-size: 72px;
    color: var(--wired);
    text-shadow: var(--glow-purple);
    text-align: center;
    line-height: 1;
    animation: pulse-title 3s ease-in-out infinite;
  }

  @keyframes pulse-title {
    0%,100% { text-shadow: 0 0 8px #7b2fff, 0 0 30px #7b2fff88; }
    50%      { text-shadow: 0 0 18px #7b2fff, 0 0 60px #7b2fffaa, 0 0 100px #7b2fff33; }
  }

  .screen-sub {
    font-family: 'VT323', monospace;
    font-size: 32px;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    text-align: center;
    letter-spacing: 4px;
  }

  .screen-text {
    font-size: 14px;
    color: var(--text);
    text-align: center;
    line-height: 1.9;
    max-width: 380px;
    opacity: 0.7;
  }

  .lain-quote {
    font-size: 15px;
    color: var(--wired);
    text-align: center;
    font-style: italic;
    opacity: 0.65;
    max-width: 380px;
    line-height: 1.7;
  }

  .blink-prompt {
    font-family: 'VT323', monospace;
    font-size: 34px;
    color: var(--green);
    text-shadow: 0 0 10px var(--green);
    animation: blink 1.2s step-end infinite;
    letter-spacing: 3px;
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0; }
  }

  .score-display {
    font-family: 'VT323', monospace;
    font-size: 44px;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    text-align: center;
  }

  .divider {
    width: 260px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--wired-dim), transparent);
  }

  #glitch-text {
    position: absolute;
    top: 18px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--red);
    text-shadow: var(--glow-red);
    opacity: 0;
    letter-spacing: 6px;
    pointer-events: none;
    transition: opacity 0.05s;
  }

  #fs-btn {
    background: none;
    border: 1px solid var(--wired-dim);
    color: var(--wired);
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 2px;
    padding: 2px 14px 4px;
    cursor: pointer;
    text-shadow: var(--glow-purple);
    box-shadow: 0 0 8px #7b2fff33;
    transition: border-color 0.15s, box-shadow 0.15s, color 0.15s;
  }
  #fs-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    box-shadow: 0 0 14px #00fff744;
  }

  /* Fullscreen: canvas fills viewport, hide outer HUD chrome */
  :fullscreen body,
  :-webkit-full-screen body {
    background: #05030f;
  }
  :fullscreen #wrapper,
  :-webkit-full-screen #wrapper {
    height: 100vh;
    justify-content: center;
    gap: 0;
  }
  :fullscreen #hud-top,
  :-webkit-full-screen #hud-top,
  :fullscreen #hud-bottom,
  :-webkit-full-screen #hud-bottom {
    display: none;
  }
  :fullscreen #canvas-container,
  :-webkit-full-screen #canvas-container {
    border: none;
    box-shadow: none;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
  }
  :fullscreen canvas,
  :-webkit-full-screen canvas {
    width: auto;
    height: 100vh;
    max-width: 100vw;
    object-fit: contain;
  }
</style>
</head>
<body>

<div id="wrapper">
  <div id="hud-top">
    <span>SCORE: <span id="score-display">000</span></span>
    <span>BEST: <span id="best-display">000</span></span>
  </div>

  <div id="canvas-container">
    <canvas id="canvas" width="560" height="700"></canvas>

    <!-- START SCREEN -->
    <div class="screen" id="start-screen">
      <div class="screen-title">FLAPPY<br>LAIN</div>
      <div class="screen-sub">// THE WIRED //</div>
      <div class="divider"></div>
      <div class="lain-quote">"No matter where you go, everybody's connected."</div>
      <div class="divider"></div>
      <div class="blink-prompt">[ SPACE ] TO ENTER</div>
      <div class="screen-text">Navigate the barriers of the Wired.<br>Don't let them disconnect you.</div>
    </div>

    <!-- DEAD SCREEN -->
    <div class="screen hidden" id="dead-screen">
      <div class="screen-title" style="color:var(--red);text-shadow:var(--glow-red);">DISCONNECTED</div>
      <div class="screen-sub" style="color:var(--red);">// SIGNAL LOST //</div>
      <div class="divider"></div>
      <div class="score-display" id="dead-score"></div>
      <div class="lain-quote" id="death-quote"></div>
      <div class="divider"></div>
      <div class="blink-prompt">[ SPACE ] RECONNECT</div>
    </div>

    <div id="glitch-text">BARRIER BREACH</div>
  </div>

  <div id="hud-bottom">
    <span>LAYER:01 // PRESENT DAY</span>
    <button id="fs-btn" onclick="toggleFS()">[ FULLSCREEN ]</button>
    <span>NAVI_OS v6.6.6</span>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width;   // 560
const H = canvas.height;  // 700

// ─────────────────────────────────────────────
//  AUDIO ENGINE  (retro chiptune via Web Audio)
// ─────────────────────────────────────────────
let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Low-level: play an oscillator with optional frequency sweep
function beep({ freq = 440, endFreq = null, type = 'square', dur = 0.1, vol = 0.18, delay = 0 } = {}) {
  try {
    const a = ac();
    const t0 = a.currentTime + delay;
    const osc  = a.createOscillator();
    const gain = a.createGain();
    // Bit-crusher style: quantise gain steps for that lo-fi crunch
    osc.connect(gain);
    gain.connect(a.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, t0 + dur);
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.setValueAtTime(vol, t0 + dur * 0.7);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    osc.start(t0);
    osc.stop(t0 + dur + 0.01);
  } catch(e) {}
}

// White noise burst
function noise({ dur = 0.08, vol = 0.25, filterFreq = 600, delay = 0 } = {}) {
  try {
    const a   = ac();
    const t0  = a.currentTime + delay;
    const buf = a.createBuffer(1, Math.ceil(a.sampleRate * dur), a.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src    = a.createBufferSource();
    const gain   = a.createGain();
    const filter = a.createBiquadFilter();
    filter.type            = 'bandpass';
    filter.frequency.value = filterFreq;
    filter.Q.value         = 1.2;
    src.buffer = buf;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(a.destination);
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    src.start(t0);
    src.stop(t0 + dur + 0.01);
  } catch(e) {}
}

// ── Sound events ──────────────────────────────
function soundStart() {
  // Ascending NES-style arpeggio boot sequence
  const notes = [220, 277, 330, 415, 523, 659, 880];
  notes.forEach((f, i) => beep({ freq: f, type: 'square', dur: 0.07, vol: 0.14, delay: i * 0.055 }));
  // Final shimmer
  beep({ freq: 1320, type: 'sine', dur: 0.35, vol: 0.10, delay: notes.length * 0.055 });
}

function soundLift() {
  // Short square blip — classic NES jump click
  beep({ freq: 523, endFreq: 660, type: 'square', dur: 0.045, vol: 0.09 });
}

function soundScore() {
  // Two-note coin collect ding
  beep({ freq: 784, type: 'square', dur: 0.06, vol: 0.15 });
  beep({ freq: 1047, type: 'square', dur: 0.12, vol: 0.12, delay: 0.06 });
}

function soundDie() {
  // NES death: descending noise crash + falling tone
  noise({ dur: 0.12, vol: 0.35, filterFreq: 900 });
  noise({ dur: 0.08, vol: 0.20, filterFreq: 300, delay: 0.08 });
  beep({ freq: 440, endFreq: 55,  type: 'square',   dur: 0.55, vol: 0.20, delay: 0.04 });
  beep({ freq: 330, endFreq: 40,  type: 'sawtooth',  dur: 0.45, vol: 0.12, delay: 0.12 });
  // Final low thud
  beep({ freq: 80,  type: 'sine', dur: 0.30, vol: 0.18, delay: 0.50 });
}

// ─────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────
let state  = 'start'; // 'start' | 'playing' | 'dead'
let score  = 0;
let best   = 0;

// Bird
const bird = {
  x: 100, y: H / 2,
  vy: 0,
  drift:     1.4,   // px/frame downward when space released
  liftForce: -1.9,  // px/frame upward when space held
  w: 28, h: 28,
  trail: [],
  glitchTimer: 0,
};

let spaceHeld        = false;
let deadScreenAnim   = false; // blocks restart during animation

// Pipes
let pipes        = [];
const PIPE_W     = 64;
const GAP        = 188;
const PIPE_SPEED = 2.1;
let pipeTimer    = 0;
const PIPE_INTVL = 115;

// Particles
let particles = [];

// Background
let bgStars = [];
let bgWires = [];
let bgTick  = 0;

// Lain quotes for death screen
const QUOTES = [
  '"Close this world, open the next."',
  '"If you\'re not remembered, you never existed."',
  '"The border between the real world and\nthe Wired is becoming more and more ambiguous."',
  '"Present day. Present time. Hahaha."',
  '"The flesh is a device for the soul to be expressed through."',
  '"Let\'s all love Lain."',
  '"I am connected. Therefore I am."',
  '"No matter where you go, everyone is connected."',
];

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function init() {
  bgStars = [];
  for (let i = 0; i < 90; i++) {
    bgStars.push({
      x:       Math.random() * W,
      y:       Math.random() * H,
      size:    Math.random() * 1.8 + 0.3,
      flicker: Math.random() * Math.PI * 2,
      speed:   Math.random() * 0.3 + 0.08,
    });
  }
  bgWires = [];
  for (let i = 0; i < 10; i++) {
    bgWires.push({
      y:       Math.random() * H,
      opacity: Math.random() * 0.14 + 0.04,
      speed:   Math.random() * 0.5 + 0.2,
      offset:  Math.random() * W,
    });
  }
}

function resetGame() {
  bird.x = 100; bird.y = H / 2; bird.vy = 0;
  bird.trail = []; bird.glitchTimer = 0;
  pipes = []; particles = []; pipeTimer = 0;
  score = 0;
  updateHUD();
}

// ─────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-display').textContent = String(score).padStart(3,'0');
  document.getElementById('best-display').textContent  = String(best).padStart(3,'0');
}

// ─────────────────────────────────────────────
//  DEATH SCREEN ANIMATION
// ─────────────────────────────────────────────
function showDeadScreenAnimated() {
  deadScreenAnim = true;
  const el = document.getElementById('dead-screen');
  el.classList.remove('hidden');
  el.style.opacity = '0';

  let frame = 0;
  (function tick() {
    frame++;
    if (frame < 24) {
      // CRT glitch flicker phase
      el.style.opacity = (frame % 4 === 0) ? '0' : String(Math.random() * 0.6 + 0.1);
    } else {
      // Smooth fade-in phase
      const p = Math.min((frame - 24) / 45, 1);
      el.style.opacity = String(p);
      if (p >= 1) { el.style.opacity = '1'; deadScreenAnim = false; return; }
    }
    requestAnimationFrame(tick);
  })();
}

// ─────────────────────────────────────────────
//  JUMP / STATE TRANSITION
// ─────────────────────────────────────────────
function jump() {
  if (state === 'start') {
    state = 'playing';
    soundStart();
    document.getElementById('start-screen').classList.add('hidden');
    return;
  }
  if (state === 'dead' && !deadScreenAnim) {
    document.getElementById('dead-screen').classList.add('hidden');
    resetGame();
    state = 'playing';
    soundStart();
  }
}

// ─────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────
function spawnLiftParticles() {
  for (let i = 0; i < 4; i++) {
    particles.push({
      x: bird.x, y: bird.y + 8,
      vx: (Math.random() - 0.5) * 2.5,
      vy: Math.random() * 2 + 0.5,
      life: 1, decay: Math.random() * 0.07 + 0.05,
      color: Math.random() > 0.5 ? '#7b2fff' : '#00fff7',
      size: Math.random() * 3 + 1,
    });
  }
}

function spawnDeathParticles() {
  for (let i = 0; i < 40; i++) {
    const spd = Math.random() * 7 + 2;
    const ang = Math.random() * Math.PI * 2;
    particles.push({
      x: bird.x, y: bird.y,
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      life: 1, decay: Math.random() * 0.02 + 0.008,
      color: ['#ff2266','#7b2fff','#00fff7','#ffffff','#ff2266'][Math.floor(Math.random()*5)],
      size: Math.random() * 6 + 2,
    });
  }
}

function spawnScoreParticles() {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x: bird.x, y: bird.y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 1, decay: 0.04,
      color: '#00ff88',
      size: Math.random() * 5 + 1,
    });
  }
}

// ─────────────────────────────────────────────
//  PIPES
// ─────────────────────────────────────────────
function addPipe() {
  const minTop = 70;
  const maxTop = H - GAP - 70;
  const topH   = Math.random() * (maxTop - minTop) + minTop;
  pipes.push({ x: W + 12, topH, bottomY: topH + GAP, scored: false, glitch: 0 });
}

function checkCollision(p) {
  const bx = bird.x - bird.w / 2 + 4;
  const by = bird.y - bird.h / 2 + 4;
  const bw = bird.w - 8;
  const bh = bird.h - 8;
  if (bx < p.x + PIPE_W && bx + bw > p.x) {
    if (by < p.topH || by + bh > p.bottomY) return true;
  }
  return false;
}

// ─────────────────────────────────────────────
//  DIE
// ─────────────────────────────────────────────
function die() {
  state = 'dead';
  soundDie();
  spawnDeathParticles();

  const gt = document.getElementById('glitch-text');
  gt.style.opacity = '1';
  setTimeout(() => { gt.style.opacity = '0'; }, 700);

  if (score > best) best = score;
  updateHUD();

  document.getElementById('dead-score').textContent =
    `SCORE: ${String(score).padStart(3,'0')}  |  BEST: ${String(best).padStart(3,'0')}`;
  document.getElementById('death-quote').textContent =
    QUOTES[Math.floor(Math.random() * QUOTES.length)];

  setTimeout(showDeadScreenAnimated, 480);
}

// ─────────────────────────────────────────────
//  DRAW — BACKGROUND
// ─────────────────────────────────────────────
function drawBackground(t) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   '#05030f');
  grad.addColorStop(0.5, '#0a0518');
  grad.addColorStop(1,   '#030210');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  bgStars.forEach(s => {
    const flick = 0.4 + 0.6 * Math.sin(t * 0.0018 * s.speed + s.flicker);
    ctx.globalAlpha = flick * 0.75;
    ctx.fillStyle = Math.random() > 0.985 ? '#00fff7' : '#c8b8ff';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
  ctx.globalAlpha = 1;

  // Horizontal wire lines
  bgWires.forEach(w => {
    ctx.globalAlpha = w.opacity * (0.6 + 0.4 * Math.sin(t * 0.0025 + w.offset));
    ctx.strokeStyle = '#7b2fff';
    ctx.lineWidth   = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, w.y); ctx.lineTo(W, w.y);
    ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // Random glitch scanline
  if (Math.random() < 0.018) {
    const gy = Math.random() * H;
    const gw = Math.random() * 160 + 30;
    const gx = Math.random() * (W - gw);
    ctx.globalAlpha = Math.random() * 0.28;
    ctx.fillStyle = Math.random() > 0.5 ? '#7b2fff' : '#00fff7';
    ctx.fillRect(gx, gy, gw, Math.random() * 2 + 0.5);
    ctx.globalAlpha = 1;
  }
}

// ─────────────────────────────────────────────
//  DRAW — PIPES
// ─────────────────────────────────────────────
function drawPipe(pipe) {
  const gx = pipe.glitch > 0 ? (Math.random() - 0.5) * 5 : 0;
  const px  = pipe.x + gx;

  // ── Top pipe body
  const g1 = ctx.createLinearGradient(px, 0, px + PIPE_W, 0);
  g1.addColorStop(0,   '#0d0524');
  g1.addColorStop(0.4, '#1a0a3a');
  g1.addColorStop(1,   '#0a0318');
  ctx.fillStyle = g1;
  ctx.fillRect(px, 0, PIPE_W, pipe.topH);

  // circuit lines inside top pipe
  for (let i = 0; i < 4; i++) {
    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = '#7b2fff';
    ctx.lineWidth   = 0.5;
    ctx.beginPath();
    ctx.moveTo(px + 10 + i * 14, 0);
    ctx.lineTo(px + 10 + i * 14, pipe.topH);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // top pipe glowing edges
  ctx.shadowColor = '#7b2fff'; ctx.shadowBlur = 10;
  ctx.strokeStyle = '#7b2fff'; ctx.lineWidth  = 1.5;
  ctx.beginPath();
  ctx.moveTo(px, 0);          ctx.lineTo(px, pipe.topH);
  ctx.moveTo(px + PIPE_W, 0); ctx.lineTo(px + PIPE_W, pipe.topH);
  ctx.stroke();

  // top pipe mouth
  ctx.fillStyle = '#1a0a3a';
  ctx.fillRect(px - 5, pipe.topH - 20, PIPE_W + 10, 20);
  ctx.shadowColor = '#00fff7'; ctx.shadowBlur = 8;
  ctx.strokeStyle = '#00fff7'; ctx.lineWidth  = 1.2;
  ctx.strokeRect(px - 5, pipe.topH - 20, PIPE_W + 10, 20);

  // ── Bottom pipe body
  const g2 = ctx.createLinearGradient(px, 0, px + PIPE_W, 0);
  g2.addColorStop(0,   '#0d0524');
  g2.addColorStop(0.4, '#1a0a3a');
  g2.addColorStop(1,   '#0a0318');
  ctx.fillStyle = g2;
  ctx.shadowBlur = 0;
  ctx.fillRect(px, pipe.bottomY, PIPE_W, H - pipe.bottomY);

  for (let i = 0; i < 4; i++) {
    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = '#7b2fff'; ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(px + 10 + i * 14, pipe.bottomY);
    ctx.lineTo(px + 10 + i * 14, H);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  ctx.shadowColor = '#7b2fff'; ctx.shadowBlur = 10;
  ctx.strokeStyle = '#7b2fff'; ctx.lineWidth  = 1.5;
  ctx.beginPath();
  ctx.moveTo(px, pipe.bottomY);          ctx.lineTo(px, H);
  ctx.moveTo(px + PIPE_W, pipe.bottomY); ctx.lineTo(px + PIPE_W, H);
  ctx.stroke();

  // bottom pipe mouth
  ctx.fillStyle = '#1a0a3a';
  ctx.fillRect(px - 5, pipe.bottomY, PIPE_W + 10, 20);
  ctx.shadowColor = '#00fff7'; ctx.shadowBlur = 8;
  ctx.strokeStyle = '#00fff7'; ctx.lineWidth  = 1.2;
  ctx.strokeRect(px - 5, pipe.bottomY, PIPE_W + 10, 20);

  ctx.shadowBlur = 0;

  // dashed centre-gap trace
  const mid = pipe.topH + GAP / 2;
  ctx.globalAlpha = 0.10;
  ctx.strokeStyle = '#7b2fff'; ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.beginPath();
  ctx.moveTo(px - 5, mid); ctx.lineTo(px + PIPE_W + 5, mid);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  if (pipe.glitch > 0) pipe.glitch--;
}

// ─────────────────────────────────────────────
//  DRAW — BIRD (pixel Lain)
// ─────────────────────────────────────────────
function drawBird() {
  // Ghost trail
  bird.trail.forEach((pos, i) => {
    const a = (i / bird.trail.length) * 0.45;
    ctx.globalAlpha = a;
    ctx.fillStyle   = '#7b2fff';
    ctx.shadowColor = '#7b2fff'; ctx.shadowBlur = 8;
    ctx.fillRect(pos.x - 4, pos.y - 4, 8, 8);
  });
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  const goff = bird.glitchTimer > 0 ? (Math.random() - 0.5) * 5 : 0;
  const tilt  = bird.vy * 0.35; // visual tilt with velocity
  const px = Math.floor(bird.x - 11 + goff);
  const py = Math.floor(bird.y - 11 + tilt);

  // Outer purple glow
  ctx.shadowColor = '#7b2fff'; ctx.shadowBlur = 20;

  // Head
  ctx.fillStyle = '#e8d8ff';
  ctx.fillRect(px + 2, py,      14, 13);

  // Eyes (cyan glow)
  ctx.fillStyle   = '#00fff7';
  ctx.shadowColor = '#00fff7'; ctx.shadowBlur = 10;
  ctx.fillRect(px + 3,  py + 4, 3, 3);
  ctx.fillRect(px + 10, py + 4, 3, 3);

  // Mouth — small dark line
  ctx.fillStyle   = '#3d1799';
  ctx.shadowBlur  = 0;
  ctx.fillRect(px + 5, py + 9, 6, 1);

  // Body
  ctx.fillStyle   = '#b098e8';
  ctx.shadowColor = '#7b2fff'; ctx.shadowBlur = 14;
  ctx.fillRect(px + 1, py + 12, 16, 9);

  // Bear ear nubs
  ctx.fillStyle = '#c8b8ff';
  ctx.fillRect(px + 2,  py - 3, 4, 4);
  ctx.fillRect(px + 12, py - 3, 4, 4);

  // Wire arms extending left + right
  ctx.fillStyle   = '#7b2fff';
  ctx.shadowColor = '#7b2fff'; ctx.shadowBlur = 6;
  ctx.fillRect(px - 7, py + 13, 8, 2);
  ctx.fillRect(px + 17, py + 13, 8, 2);

  // Wire end nodes
  ctx.fillStyle   = '#00fff7';
  ctx.shadowColor = '#00fff7'; ctx.shadowBlur = 8;
  ctx.fillRect(px - 9,  py + 13, 2, 2);
  ctx.fillRect(px + 25, py + 13, 2, 2);

  ctx.shadowBlur = 0;
  if (bird.glitchTimer > 0) bird.glitchTimer--;
}

// ─────────────────────────────────────────────
//  DRAW — PARTICLES
// ─────────────────────────────────────────────
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 10;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

// ─────────────────────────────────────────────
//  DRAW — FLOOR
// ─────────────────────────────────────────────
function drawFloor(t) {
  const fy = H - 36;
  ctx.fillStyle = '#0d0524';
  ctx.fillRect(0, fy, W, 36);

  ctx.strokeStyle = '#7b2fff'; ctx.shadowColor = '#7b2fff'; ctx.shadowBlur = 8;
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(0, fy); ctx.lineTo(W, fy); ctx.stroke();

  // Scrolling dots
  ctx.fillStyle = '#00fff7'; ctx.shadowColor = '#00fff7'; ctx.shadowBlur = 5;
  const sp = 36;
  const off = (t * PIPE_SPEED * 0.5) % sp;
  for (let x = -sp + off; x < W + sp; x += sp) {
    ctx.fillRect(x,      fy + 10, 3, 3);
    ctx.fillRect(x + 14, fy + 22, 3, 3);
  }
  ctx.shadowBlur = 0;
}

// ─────────────────────────────────────────────
//  DRAW — INGAME SCORE
// ─────────────────────────────────────────────
function drawScoreIngame() {
  if (state !== 'playing') return;
  ctx.font      = '38px VT323, monospace';
  ctx.fillStyle = '#7b2fff';
  ctx.shadowColor = '#7b2fff'; ctx.shadowBlur = 12;
  ctx.textAlign = 'center';
  ctx.fillText(String(score).padStart(3,'0'), W / 2, 52);
  ctx.shadowBlur = 0;
}

// ─────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────
function update(t) {
  bgTick = t;
  if (state !== 'playing') return;

  // Physics
  if (spaceHeld) {
    bird.vy = bird.liftForce;
    if (Math.random() < 0.3)  spawnLiftParticles();
    if (Math.random() < 0.09) soundLift();
  } else {
    bird.vy = bird.drift;
  }
  bird.y += bird.vy;

  // Trail
  bird.trail.push({ x: bird.x, y: bird.y });
  if (bird.trail.length > 12) bird.trail.shift();

  // Bounds
  if (bird.y < 12)             { bird.y = 12; }
  if (bird.y > H - 36 - bird.h / 2) { die(); return; }

  // Pipes
  pipeTimer++;
  if (pipeTimer >= PIPE_INTVL) { addPipe(); pipeTimer = 0; }
  pipes = pipes.filter(p => p.x + PIPE_W + 12 > 0);

  for (const p of pipes) {
    p.x -= PIPE_SPEED;
    if (!p.scored && p.x + PIPE_W < bird.x - bird.w / 2) {
      p.scored = true;
      score++;
      soundScore();
      spawnScoreParticles();
      p.glitch = 5;
      updateHUD();
    }
    if (checkCollision(p)) { die(); return; }
  }

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= p.decay; });
  particles = particles.filter(p => p.life > 0);
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render(t) {
  ctx.clearRect(0, 0, W, H);
  drawBackground(t);
  pipes.forEach(drawPipe);
  drawFloor(t);
  drawParticles();
  if (state !== 'start') drawBird();
  drawScoreIngame();
}

// ─────────────────────────────────────────────
//  LOOP
// ─────────────────────────────────────────────
function loop(t) {
  update(t);
  render(t);
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code !== 'Space' && e.key !== ' ') return;
  e.preventDefault();
  if (state === 'start' || state === 'dead') { jump(); return; }
  spaceHeld = true;
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.key === ' ') spaceHeld = false;
});
document.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'start' || state === 'dead') { jump(); return; }
  spaceHeld = true;
}, { passive: false });
document.addEventListener('touchend',  () => { spaceHeld = false; });
canvas.addEventListener('mousedown', e => {
  if (state === 'start' || state === 'dead') { jump(); return; }
  spaceHeld = true;
});
canvas.addEventListener('mouseup', () => { spaceHeld = false; });

// ─────────────────────────────────────────────
//  FULLSCREEN
// ─────────────────────────────────────────────
function toggleFS() {
  const el = document.documentElement;
  const isFS = document.fullscreenElement || document.webkitFullscreenElement;
  if (!isFS) {
    (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}
document.addEventListener('fullscreenchange',       updateFSBtn);
document.addEventListener('webkitfullscreenchange', updateFSBtn);
function updateFSBtn() {
  const isFS = document.fullscreenElement || document.webkitFullscreenElement;
  document.getElementById('fs-btn').textContent = isFS ? '[ EXIT FULL ]' : '[ FULLSCREEN ]';
}

// ─────────────────────────────────────────────
//  GO
// ─────────────────────────────────────────────
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
